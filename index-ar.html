<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>خيارات تقسيم مربع 19</title>
<script src="blocks-data.js"></script>
<style>
  :root {
    --color-unallocated: #d9d9d9;
    --color-blue: #1f6fb5;
    --color-yellow: #f5c518;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    margin: 0;
    padding: 16px;
    background: #f4f4f4;
    color: #222;
  }
  h1 {
    text-align: center;
    margin: 0 0 16px;
    font-size: 24px;
  }
  .main {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    align-items: flex-start;
  }
  .left-panel {
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-width: 460px;
  }
  .panel {
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 10px 12px;
  }
  .panel h2 {
    font-size: 15px;
    margin: 0 0 8px;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 13px;
  }
  table th, table td {
    border: 1px solid #ccc;
    padding: 4px 6px;
    text-align: left;
  }
  table th:first-child, table td:first-child {
    text-align: right;
  }
  table thead th {
    background: #eee;
  }
  table tfoot td {
    font-weight: bold;
    background: #f7f7f7;
  }
  table input[type="number"] {
    width: 70px;
    text-align: right;
  }
  .grid-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    justify-content: center;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 8px 12px;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .control-group span {
    font-size: 13px;
    color: #555;
  }
  button {
    cursor: pointer;
    border: 1px solid #999;
    background: #f0f0f0;
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
  }
  button.active {
    background: #333;
    color: #fff;
    border-color: #333;
  }
  #resetBtn {
    background: #fde0e0;
    border-color: #c66;
  }
  .grid-wrap {
    width: min(900px, 92vw);
  }
  .grid {
    position: relative;
    width: 100%;
    display: grid;
    border-top: 1px solid #999;
    border-left: 6px solid #111;
    border-right: 6px solid #111;
    border-bottom: 6px solid #111;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  .block {
    position: relative;
    border: 1px solid #aaa;
    background: var(--color-unallocated);
    transition: background-color 0.05s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.1;
    padding: 1px;
    direction: ltr;
  }
  .block.color-unallocated { background: var(--color-unallocated); }
  .block.color-blue { background: var(--color-blue); }
  .block.color-yellow { background: var(--color-yellow); }
  .block .label-id {
    font-size: 8px;
    font-weight: 700;
    color: rgba(0,0,0,0.65);
    white-space: nowrap;
  }
  .block .label-sqm {
    font-size: 7px;
    color: rgba(0,0,0,0.55);
    white-space: nowrap;
  }
  .street-bar {
    background: #bbb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 600;
    color: #111;
    white-space: nowrap;
    overflow: hidden;
  }
  .street-bar.vertical {
    writing-mode: vertical-rl;
    text-orientation: mixed;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #444;
  }
  .legend .swatch {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 1px solid #999;
    vertical-align: middle;
    margin-left: 4px;
  }
  .slots-panel {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .slots-panel select, .slots-panel input[type="text"] {
    font-size: 13px;
    padding: 4px 6px;
    font-family: inherit;
  }
  #statusMsg {
    min-height: 18px;
    font-size: 12px;
    color: #2a7a2a;
    text-align: center;
  }
  body.locked h1, body.locked .main {
    display: none;
  }
  .gate-overlay {
    position: fixed;
    inset: 0;
    background: #f4f4f4;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .gate-card {
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 28px 32px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    min-width: 260px;
  }
  .gate-card p {
    margin: 0 0 12px;
    font-size: 14px;
    color: #333;
  }
  .gate-card input[type="password"] {
    font-size: 14px;
    padding: 6px 8px;
    width: 180px;
    margin-bottom: 10px;
    font-family: inherit;
  }
  .gate-card button {
    display: block;
    width: 100%;
    margin-top: 4px;
    font-family: inherit;
  }
  .gate-error {
    color: #c33;
    font-size: 12px;
    min-height: 16px;
    margin-top: 8px;
  }
</style>
</head>
<body class="locked">

<div id="gateOverlay" class="gate-overlay">
  <div class="gate-card">
    <p>هذه الصفحة محمية بكلمة مرور.</p>
    <form id="gateForm">
      <input type="password" id="gatePassword" placeholder="كلمة المرور" autocomplete="off" />
      <button type="submit">دخول</button>
    </form>
    <div id="gateError" class="gate-error"></div>
  </div>
</div>

<script>
(function () {
  "use strict";
  var PASSWORD = "191919";
  var STORAGE_KEY = "box19_unlocked";
  var overlay = document.getElementById("gateOverlay");
  var form = document.getElementById("gateForm");
  var input = document.getElementById("gatePassword");
  var error = document.getElementById("gateError");

  function unlock() {
    document.body.classList.remove("locked");
    overlay.style.display = "none";
  }

  if (localStorage.getItem(STORAGE_KEY) === "1") {
    unlock();
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    if (input.value === PASSWORD) {
      localStorage.setItem(STORAGE_KEY, "1");
      unlock();
    } else {
      error.textContent = "كلمة المرور غير صحيحة.";
      input.value = "";
      input.focus();
    }
  });
})();
</script>

<h1>خيارات تقسيم مربع 19</h1>

<div class="main">

  <div class="left-panel">
    <div class="panel">
      <h2>المساحة</h2>
      <table id="areaTable">
        <thead>
          <tr><th>المجموعة</th><th>غير مقسم</th><th>أزرق</th><th>أصفر</th><th>إجمالي</th></tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr><td>إجمالي</td><td id="area-all-unalloc">0</td><td id="area-all-blue">0</td><td id="area-all-yellow">0</td><td id="area-all-total">0</td></tr>
        </tfoot>
      </table>
    </div>

    <div class="panel">
      <h2>القيمة البيعية</h2>
      <table id="valueTable">
        <thead>
          <tr><th>المجموعة</th><th>سعر المتر</th><th>غير مقسم</th><th>أزرق</th><th>أصفر</th><th>إجمالي</th></tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr><td>إجمالي</td><td></td><td id="value-all-unalloc">0</td><td id="value-all-blue">0</td><td id="value-all-yellow">0</td><td id="value-all-total">0</td></tr>
        </tfoot>
      </table>
    </div>
  </div>

  <div class="grid-panel">
    <div class="controls">
      <div class="control-group">
        <span>اللون:</span>
        <button class="color-btn active" data-color="blue">أزرق</button>
        <button class="color-btn" data-color="yellow">أصفر</button>
      </div>
      <button id="resetBtn">مسح الألوان</button>
      <button id="exportBtn">تصدير الملف إكسل</button>
    </div>

    <div class="grid-wrap" dir="ltr">
      <div class="grid" id="grid"></div>
    </div>

    <div class="legend">
      <span><i class="swatch" style="background:#d9d9d9"></i>غير مقسم</span>
      <span><i class="swatch" style="background:#1f6fb5"></i>أزرق</span>
      <span><i class="swatch" style="background:#f5c518"></i>أصفر</span>
    </div>

    <div class="slots-panel">
      <label>خانة الحفظ:
        <select id="slotSelect"></select>
      </label>
      <input type="text" id="slotName" placeholder="اسم الخيار" />
      <button id="saveBtn">حفظ</button>
      <button id="loadBtn">فتح</button>
      <button id="deleteBtn">مسح</button>
    </div>
    <div id="statusMsg"></div>
  </div>

</div>

<script>
(function () {
  "use strict";

  var GROUPS = ["salman", "thirty six", "aziz", "houses", "services"];
  var GROUP_LABELS = {
    salman: "طريق الملك سلمان", "thirty six": "شارع 36م", aziz: "طريق الملك عبدالعزيز",
    houses: "سكني", services: "خدمات"
  };
  var SLOT_COUNT = 10;
  var STORAGE_KEY = "box19_slots_v2_ar";
  var DEFAULT_PRICES = {
    salman: 9000, "thirty six": 5400, aziz: 7000,
    houses: 4800, services: 4800
  };

  var blocks = BLOCKS.map(function (b) {
    return {
      id: b.id, sqm: b.sqm, group: b.group, color: b.color,
      row_start: b.row_start, row_end: b.row_end,
      col_start: b.col_start, col_end: b.col_end,
      el: null
    };
  });
  var blocksById = new Map();
  blocks.forEach(function (b) { blocksById.set(b.id, b); });

  var prices = {};
  GROUPS.forEach(function (g) { prices[g] = DEFAULT_PRICES[g]; });

  var activeColor = "blue";

  var gridEl = document.getElementById("grid");

  var COL_PX_PER_UNIT = 7;
  var ROW_PX_PER_PT = 1.3333;
  var totalColPx = COL_WIDTHS.reduce(function (s, w) { return s + w; }, 0) * COL_PX_PER_UNIT;
  var totalRowPx = ROW_HEIGHTS.reduce(function (s, h) { return s + h; }, 0) * ROW_PX_PER_PT;
  gridEl.style.aspectRatio = (totalColPx / totalRowPx).toFixed(4);
  gridEl.style.gridTemplateColumns = COL_WIDTHS.map(function (w) { return w + "fr"; }).join(" ");
  gridEl.style.gridTemplateRows = ROW_HEIGHTS.map(function (h) { return h + "fr"; }).join(" ");

  function buildGridDOM() {
    STREETS.forEach(function (s) {
      var bar = document.createElement("div");
      var vertical = s.col_end - s.col_start < s.row_end - s.row_start;
      bar.className = "street-bar" + (vertical ? " vertical" : "");
      bar.textContent = GROUP_LABELS[s.name] || s.name;
      bar.style.gridColumn = s.col_start + " / " + s.col_end;
      bar.style.gridRow = s.row_start + " / " + s.row_end;
      gridEl.appendChild(bar);
    });

    blocks.forEach(function (b) {
      var cell = document.createElement("div");
      cell.className = "block color-unallocated";
      cell.dataset.id = b.id;
      cell.style.gridColumn = b.col_start + " / " + b.col_end;
      cell.style.gridRow = b.row_start + " / " + b.row_end;
      cell.title = b.id + " - " + b.sqm + " m2";

      var idLabel = document.createElement("span");
      idLabel.className = "label-id";
      idLabel.textContent = b.id;
      cell.appendChild(idLabel);

      var sqmLabel = document.createElement("span");
      sqmLabel.className = "label-sqm";
      sqmLabel.textContent = b.sqm + " m²";
      cell.appendChild(sqmLabel);

      gridEl.appendChild(cell);
      b.el = cell;
    });
  }

  function updateGridColors() {
    blocks.forEach(function (b) {
      b.el.classList.remove("color-unallocated", "color-blue", "color-yellow");
      b.el.classList.add("color-" + b.color);
    });
  }

  function sumSqm(list) {
    return list.reduce(function (s, b) { return s + b.sqm; }, 0);
  }

  var areaTbody = document.querySelector("#areaTable tbody");
  var valueTbody = document.querySelector("#valueTable tbody");
  var rowCells = {};

  GROUPS.forEach(function (g) {
    var areaTr = document.createElement("tr");
    areaTr.innerHTML =
      "<td>" + GROUP_LABELS[g] + "</td>" +
      '<td data-c="unalloc">0</td>' +
      '<td data-c="blue">0</td>' +
      '<td data-c="yellow">0</td>' +
      '<td data-c="total">0</td>';
    areaTbody.appendChild(areaTr);

    var valueTr = document.createElement("tr");
    valueTr.innerHTML =
      "<td>" + GROUP_LABELS[g] + "</td>" +
      '<td><input type="number" min="0" step="any" data-price-for="' + g + '" value="' + DEFAULT_PRICES[g] + '" /></td>' +
      '<td data-c="unalloc">0</td>' +
      '<td data-c="blue">0</td>' +
      '<td data-c="yellow">0</td>' +
      '<td data-c="total">0</td>';
    valueTbody.appendChild(valueTr);

    rowCells[g] = {
      area: {
        unalloc: areaTr.querySelector('[data-c="unalloc"]'),
        blue: areaTr.querySelector('[data-c="blue"]'),
        yellow: areaTr.querySelector('[data-c="yellow"]'),
        total: areaTr.querySelector('[data-c="total"]')
      },
      value: {
        unalloc: valueTr.querySelector('[data-c="unalloc"]'),
        blue: valueTr.querySelector('[data-c="blue"]'),
        yellow: valueTr.querySelector('[data-c="yellow"]'),
        total: valueTr.querySelector('[data-c="total"]')
      },
      priceInput: valueTr.querySelector("input")
    };
  });

  valueTbody.addEventListener("input", function (e) {
    var g = e.target.getAttribute("data-price-for");
    if (!g) return;
    var v = parseFloat(e.target.value);
    prices[g] = isNaN(v) ? 0 : v;
    renderTables();
  });

  var fmt = function (n) { return Math.round(n).toLocaleString(); };

  function renderTables() {
    var allUnalloc = 0, allBlue = 0, allYellow = 0, allTotal = 0;
    var allVUnalloc = 0, allVBlue = 0, allVYellow = 0, allVTotal = 0;

    GROUPS.forEach(function (g) {
      var list = blocks.filter(function (b) { return b.group === g; });
      var unalloc = sumSqm(list.filter(function (b) { return b.color === "unallocated"; }));
      var blue = sumSqm(list.filter(function (b) { return b.color === "blue"; }));
      var yellow = sumSqm(list.filter(function (b) { return b.color === "yellow"; }));
      var total = unalloc + blue + yellow;

      var cells = rowCells[g];
      cells.area.unalloc.textContent = fmt(unalloc);
      cells.area.blue.textContent = fmt(blue);
      cells.area.yellow.textContent = fmt(yellow);
      cells.area.total.textContent = fmt(total);

      var price = prices[g] || 0;
      var vUnalloc = unalloc * price, vBlue = blue * price, vYellow = yellow * price, vTotal = total * price;
      cells.value.unalloc.textContent = fmt(vUnalloc);
      cells.value.blue.textContent = fmt(vBlue);
      cells.value.yellow.textContent = fmt(vYellow);
      cells.value.total.textContent = fmt(vTotal);

      allUnalloc += unalloc; allBlue += blue; allYellow += yellow; allTotal += total;
      allVUnalloc += vUnalloc; allVBlue += vBlue; allVYellow += vYellow; allVTotal += vTotal;
    });

    document.getElementById("area-all-unalloc").textContent = fmt(allUnalloc);
    document.getElementById("area-all-blue").textContent = fmt(allBlue);
    document.getElementById("area-all-yellow").textContent = fmt(allYellow);
    document.getElementById("area-all-total").textContent = fmt(allTotal);

    document.getElementById("value-all-unalloc").textContent = fmt(allVUnalloc);
    document.getElementById("value-all-blue").textContent = fmt(allVBlue);
    document.getElementById("value-all-yellow").textContent = fmt(allVYellow);
    document.getElementById("value-all-total").textContent = fmt(allVTotal);
  }

  function paintCell(b, color) {
    if (b.color !== color) {
      b.color = color;
      b.el.classList.remove("color-unallocated", "color-blue", "color-yellow");
      b.el.classList.add("color-" + color);
      renderTables();
    }
  }

  gridEl.addEventListener("pointerdown", function (e) {
    var blockEl = e.target.closest(".block");
    if (!blockEl) return;
    e.preventDefault();
    var b = blocksById.get(blockEl.dataset.id);
    if (b) paintCell(b, activeColor);
  });

  document.querySelectorAll(".color-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      document.querySelectorAll(".color-btn").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      activeColor = btn.dataset.color;
    });
  });

  document.getElementById("resetBtn").addEventListener("click", function () {
    if (!confirm("هل تريد مسح جميع الألوان؟")) return;
    blocks.forEach(function (b) { b.color = "unallocated"; });
    updateGridColors();
    renderTables();
    showStatus("تم مسح جميع الألوان.");
  });

  document.getElementById("exportBtn").addEventListener("click", function () {
    var lines = ["code,group,sqm,color"];
    blocks.forEach(function (b) {
      lines.push([b.id, b.group, b.sqm, b.color].join(","));
    });
    var blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "block19_export.csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showStatus("تم تصدير الملف.");
  });

  // ---- Save / Load slots ----
  var slotSelect = document.getElementById("slotSelect");
  var slotNameInput = document.getElementById("slotName");
  var statusMsg = document.getElementById("statusMsg");
  var statusTimer = null;

  function showStatus(msg) {
    statusMsg.textContent = msg;
    if (statusTimer) clearTimeout(statusTimer);
    statusTimer = setTimeout(function () { statusMsg.textContent = ""; }, 3500);
  }

  function loadSlots() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return new Array(SLOT_COUNT).fill(null);
      var parsed = JSON.parse(raw);
      if (!Array.isArray(parsed) || parsed.length !== SLOT_COUNT) return new Array(SLOT_COUNT).fill(null);
      return parsed;
    } catch (e) {
      return new Array(SLOT_COUNT).fill(null);
    }
  }

  function persistSlots(slots) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(slots));
  }

  var slots = loadSlots();

  function populateSlotSelect() {
    var prevValue = slotSelect.value;
    slotSelect.innerHTML = "";
    slots.forEach(function (slot, idx) {
      var opt = document.createElement("option");
      opt.value = idx;
      opt.textContent = (idx + 1) + ": " + (slot ? slot.name : "(فارغ)");
      slotSelect.appendChild(opt);
    });
    if (prevValue !== "" && prevValue !== null) slotSelect.value = prevValue;
    syncNameInput();
  }

  function syncNameInput() {
    var idx = parseInt(slotSelect.value, 10);
    var slot = slots[idx];
    slotNameInput.value = slot ? slot.name : "";
  }

  slotSelect.addEventListener("change", syncNameInput);

  document.getElementById("saveBtn").addEventListener("click", function () {
    var idx = parseInt(slotSelect.value, 10);
    var name = slotNameInput.value.trim() || ("خيار " + (idx + 1));
    var colors = {};
    blocks.forEach(function (b) { colors[b.id] = b.color; });
    slots[idx] = { name: name, colors: colors, prices: Object.assign({}, prices), savedAt: Date.now() };
    persistSlots(slots);
    populateSlotSelect();
    slotSelect.value = idx;
    showStatus('تم الحفظ في الخانة ' + (idx + 1) + ' باسم "' + name + '".');
  });

  document.getElementById("loadBtn").addEventListener("click", function () {
    var idx = parseInt(slotSelect.value, 10);
    var slot = slots[idx];
    if (!slot) { showStatus("الخانة " + (idx + 1) + " فارغة."); return; }
    blocks.forEach(function (b) {
      b.color = slot.colors[b.id] || "unallocated";
    });
    GROUPS.forEach(function (g) {
      if (slot.prices && typeof slot.prices[g] === "number") {
        prices[g] = slot.prices[g];
        rowCells[g].priceInput.value = slot.prices[g];
      }
    });
    updateGridColors();
    renderTables();
    showStatus('تم فتح "' + slot.name + '" من الخانة ' + (idx + 1) + ".");
  });

  document.getElementById("deleteBtn").addEventListener("click", function () {
    var idx = parseInt(slotSelect.value, 10);
    if (!slots[idx]) { showStatus("الخانة " + (idx + 1) + " فارغة بالفعل."); return; }
    if (!confirm('هل تريد حذف الخانة ' + (idx + 1) + ' ("' + slots[idx].name + '")؟')) return;
    slots[idx] = null;
    persistSlots(slots);
    populateSlotSelect();
    showStatus("تم حذف الخانة " + (idx + 1) + ".");
  });

  buildGridDOM();
  updateGridColors();
  renderTables();
  populateSlotSelect();
})();
</script>
</body>
</html>
